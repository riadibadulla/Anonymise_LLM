<!DOCTYPE html>
<!--
  Open this file in a browser, then click each "Download" button to save the PNG icons.
  Place the downloaded files in this /icons/ folder.
-->
<html>
<head><title>Generate Icons</title></head>
<body style="font-family:sans-serif;padding:20px;background:#0f172a;color:#f1f5f9">
<h2>Privacy Shield — Icon Generator</h2>
<div id="icons" style="display:flex;gap:20px;flex-wrap:wrap;margin-top:16px"></div>
<script>
const sizes = [16, 48, 128];
sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size;

  // Background circle
  const grad = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
  grad.addColorStop(0, '#1e40af');
  grad.addColorStop(1, '#1e293b');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(s/2, s/2, s/2, 0, Math.PI*2);
  ctx.fill();

  // Shield shape
  ctx.strokeStyle = '#22c55e';
  ctx.fillStyle = 'rgba(34,197,94,0.15)';
  ctx.lineWidth = Math.max(1, s * 0.07);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  const p = s * 0.12; // padding
  const w = s - p*2;
  const h = s - p*2;
  const cx = s/2, top = p, bottom = s - p*0.5;
  const halfW = w/2;

  ctx.beginPath();
  ctx.moveTo(cx, top);
  ctx.lineTo(cx + halfW, top + h*0.2);
  ctx.lineTo(cx + halfW, top + h*0.55);
  ctx.quadraticCurveTo(cx + halfW, bottom, cx, bottom);
  ctx.quadraticCurveTo(cx - halfW, bottom, cx - halfW, top + h*0.55);
  ctx.lineTo(cx - halfW, top + h*0.2);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px';
  wrapper.innerHTML = `<p style="color:#94a3b8;font-size:12px">${size}×${size}</p>`;
  wrapper.appendChild(canvas);

  const link = document.createElement('a');
  link.textContent = `Download icon${size}.png`;
  link.style.cssText = 'color:#3b82f6;font-size:12px;cursor:pointer';
  link.addEventListener('click', () => {
    link.href = canvas.toDataURL('image/png');
    link.download = `icon${size}.png`;
  });
  wrapper.appendChild(link);
  document.getElementById('icons').appendChild(wrapper);
});
</script>
</body>
</html>
